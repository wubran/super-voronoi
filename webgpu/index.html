<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Voronoi!</title>
    <style>
      @import url(resources/webgpu-lesson.css);
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: relative;
      }
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #101020 0%, #202f4b 100%);
        color: #eef;
        font-family: system-ui, sans-serif;
      }
      .background {
        position: absolute;
        inset: 0;
        padding: 2rem;
        z-index: 0;
        pointer-events: none;
      }
      .background h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 4vw, 3rem);
      }
      .background p {
        max-width: 42rem;
        line-height: 1.5;
      }
      canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        max-width: none;
        max-height: none;
        box-sizing: border-box;
        border: 1px solid #888;
        background-color: transparent;
        z-index: 1;
      }

      #gpu-image-overlay {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 2;
        transform-origin: top left;
        pointer-events: auto;
        opacity: 1.0;
        max-width: none;
        max-height: none;
        border-radius: 22px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35), 0 8px 24px rgba(0, 0, 0, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.12);
        overflow: hidden;
        background: rgba(255, 255, 255, 0.04);
      }
      .tag:hover {
        cursor: pointer;
        background: rgba(96, 98, 103, 0.9);
      }
    </style>
  </head>
  <body>
    <div class="background">
      <!-- <h1>Under-canvas DOM test</h1> -->
    </div>
  </body>
  <!-- <script type="text/javascript" src="stl_loader.js"></script> -->
  <script type="text/javascript" src="vec2.js"></script>
  <script type="text/javascript" src="particles.js"></script>
  <script type="text/javascript" src="quadtree.js"></script>
  <script type="text/javascript" src="parse.js"></script>
  <script type="text/javascript" src="animation.js"></script>
  <script type="module" src="main.js"></script>
</html>
